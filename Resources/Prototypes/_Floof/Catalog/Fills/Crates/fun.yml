          tableId: FunMaleLootboxHat
          rolls: !type:ConstantNumberSelector { value: 1 }
        - !type:NestedSelector
          tableId: FunMaleLootboxHomeDefense
          rolls: !type:ConstantNumberSelector { value: 1 }
        - id: DrinkSpaceLube
          amount: !type:ConstantNumberSelector { value: 1 }
        - !type:NestedSelector
          tableId: FunMaleLootboxSmokes
          rolls: !type:ConstantNumberSelector { value: 1 }
